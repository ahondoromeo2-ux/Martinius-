<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martinius - Inbox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #fff; padding-top: 60px; padding-bottom: 70px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; height: 60px; background-color: #fff;
            border-bottom: 1px solid #dbdbdb; position: fixed; top: 0; width: 100%;
        }

        .chat-list { padding: 10px; }
        .chat-item {
            display: flex; align-items: center; padding: 15px 10px;
            border-bottom: 1px solid #f0f0f0; cursor: pointer;
        }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background-color: #ccc; margin-right: 15px; }
        .chat-info h3 { font-size: 1rem; }
        .chat-info p { font-size: 0.85rem; color: #888; margin-top: 4px; }

        footer {
            display: flex; justify-content: space-around; align-items: center;
            height: 60px; background-color: #ffffff; border-top: 1px solid #dbdbdb;
            position: fixed; bottom: 0; width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <i class="fa-solid fa-arrow-left"></i>
        <h2>Messages</h2>
        <i class="fa-regular fa-pen-to-square"></i>
    </header>

    <main class="chat-list">
        <!-- Groupe d'amis -->
        <div class="chat-item">
            <div class="avatar" style="background-color: #6366f1;"></div>
            <div class="chat-info">
                <h3>Groupe des Créateurs</h3>
                <p>Roméo : Quel est le prochain débat ?</p>
            </div>
        </div>

        <!-- Discussion privée -->
        <div class="chat-item">
            <div class="avatar" style="background-color: #ec4899;"></div>
            <div class="chat-info">
                <h3>Déborah</h3>
                <p>À bientôt à Paris ! 🇫🇷</p>
            </div>
        </div>
    </main>

    <footer>
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-solid fa-clapperboard"></i>
        <i class="fa-regular fa-user"></i>
    </footer>

</body>
</html>
