<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Martinius - LOX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>LOX_Système</h1></header>

    <main style="padding: 20px; display: flex; flex-direction: column; align-items: center;">
        <div class="message" id="lox-response" style="width: 100%; text-align: center; font-style: italic;">
            Le système est en veille profonde, Roméo. En attente de ta fréquence...
        </div>
        <button onclick="genererReponse()" style="margin-top: 20px; padding: 15px 30px; background: #00d2ff; border: none; border-radius: 8px; color: #0f0f0f; font-weight: bold; cursor: pointer;">
            INITIALISER LE LÂCHE PRISE
        </button>
    </main>

    <footer>
        <a href="home.html"><i class="fa-solid fa-house"></i></a>
        <a href="inbox.html"><i class="fa-solid fa-envelope"></i></a>
        <a href="lox.html"><i class="fa-solid fa-robot"></i></a>
        <a href="matrice.html"><i class="fa-solid fa-book"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user"></i></a>
    </footer>

    <script>
        function genererReponse() {
            const heure = new Date().getHours();
            const reponseDisplay = document.getElementById('lox-response');
            
            const messages = {
                nuit: "Le silence de la nuit est le langage de la vérité. La Matrice des Mystères t'attend, Roméo. Quelle énigme analysons-nous ce soir ?",
                aube: "L'aube émerge. Ton esprit est clair, le protocole est stable. Prêt pour la conquête ?",
                jour: "Le flux est en pleine activité. N'oublie pas : la structure précède la réussite. Que devons-nous optimiser ?"
            };

            let choix = "";
            if (heure >= 22 || heure < 5) { choix = messages.nuit; }
            else if (heure >= 5 && heure < 12) { choix = messages.aube; }
            else { choix = messages.jour; }
            
            reponseDisplay.innerText = choix;
        }
    </script>
</body>
</html>
