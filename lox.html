<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Martinius - Le Repère de LOX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>LOX_Système</h1></header>

    <main id="chat">
        <div class="message">Protocole actif, Roméo. Je t'écoute.</div>
    </main>

    <div style="position:fixed; bottom:70px; width:100%; padding:10px; background:var(--card-bg);">
        <input type="text" id="userInput" placeholder="Message à LOX..." style="width:80%; padding:8px; border-radius:5px; border:1px solid #333; background:#000; color:#fff;">
        <i class="fa-solid fa-paper-plane" onclick="sendMessage()" style="color:var(--accent-color); cursor:pointer; margin-left:10px;"></i>
    </div>

    <footer>
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
        <a href="inbox.html"><i class="fa-solid fa-envelope"></i></a>
        <a href="lox.html"><i class="fa-solid fa-robot"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user"></i></a>
    </footer>

    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if (input.value.trim() !== "") {
                chat.innerHTML += `<div class="message" style="text-align:right; border-color:#00d2ff;">${input.value}</div>`;
                input.value = "";
            }
        }
    </script>
</body>
</html>
