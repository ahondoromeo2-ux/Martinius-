<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martinius - Le Repère de LOX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Thème Sombre pour le Repère de LOX */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            padding-top: 60px;
            padding-bottom: 140px; /* Espace pour la barre de chat ET le footer */
        }

        /* En-tête */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: 60px;
            background-color: #1e1e1e;
            border-bottom: 1px solid #333;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #00d2ff; /* Bleu néon technologique */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-icons i {
            font-size: 1.4rem;
            color: #e0e0e0;
            cursor: pointer;
        }

        /* Grille des modules (Horoscope, Bible, Jeux, etc.) */
        .modules-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .module-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .module-card:active {
            background-color: #2a2a2a;
        }

        .module-card i {
            font-size: 2rem;
            color: #00d2ff;
            margin-bottom: 10px;
        }

        .module-title {
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Module spécial : Journal intime */
        .module-card.secret {
            grid-column: span 2;
            background: linear-gradient(135deg, #1e1e1e 0%, #2a1b38 100%);
            border: 1px solid #6b4c9a;
        }

        .module-card.secret i {
            color: #b084cc;
        }

        /* Zone de conversation IA */
        .chat-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.lox {
            background-color: #2c2c2c;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message.user {
            background-color: #0056b3;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        /* Barre de saisie (Chatbox) */
        .chat-input-wrapper {
            position: fixed;
            bottom: 60px; /* Juste au-dessus du footer */
            width: 100%;
            background-color: #1e1e1e;
            padding: 10px 15px;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 999;
        }

        .chat-input-wrapper i {
            font-size: 1.2rem;
            color: #00d2ff;
            cursor: pointer;
        }

        .chat-input-wrapper input {
            flex: 1;
            background-color: #2c2c2c;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            color: #fff;
            outline: none;
        }

        .chat-input-wrapper input::placeholder {
            color: #888;
        }

        /* Barre de navigation basse (Footer) identique au QG */
        footer {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 60px;
            background-color: #ffffff; /* Reste blanc pour la cohérence globale du site */
            border-top: 1px solid #dbdbdb;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
        }

        footer i {
            font-size: 1.5rem;
            color: #262626;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Barre supérieure -->
    <header>
        <h1>LOX_Système</h1>
        <div class="header-icons">
            <i class="fa-solid fa-gear"></i> <!-- Paramètres -->
        </div>
    </header>

    <!-- Menu des Fonctionnalités -->
    <div class="modules-grid">
        <div class="module-card secret">
            <i class="fa-solid fa-book-journal-whills"></i>
            <span class="module-title">La matrice des mystères (Crypté)</span>
        </div>
        <div class="module-card">
            <i class="fa-solid fa-gamepad"></i>
            <span class="module-title">Mini-Jeux</span>
        </div>
        <div class="module-card">
            <i class="fa-solid fa-book-bible"></i>
            <span class="module-title">La Bible</span>
        </div>
        <div class="module-card">
            <i class="fa-solid fa-moon"></i>
            <span class="module-title">Horoscope</span>
        </div>
        <div class="module-card">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span class="module-title">Contes & Histoires</span>
        </div>
    </div>

    <!-- Interface de discussion -->
    <main class="chat-container">
        <div class="message lox">
            Protocole actif. Bonjour Roméo. Le Repère est opérationnel. Que souhaites-tu faire aujourd'hui ?
        </div>
    </main>

    <!-- Barre de saisie IA -->
    <div class="chat-input-wrapper">
        <i class="fa-solid fa-plus"></i> <!-- Pour téléverser des fichiers -->
        <i class="fa-solid fa-lightbulb"></i> <!-- Pour les suggestions -->
        <input type="text" placeholder="Message à LOX...">
        <i class="fa-solid fa-paper-plane"></i>
    </div>

    <!-- Barre de navigation inférieure -->
    <footer>
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-solid fa-clapperboard"></i>
        <i class="fa-regular fa-user"></i>
    </footer>

</body>
</html>
