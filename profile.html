<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Martinius - Profil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #fafafa; padding-bottom: 70px; }
        
        .profile-header { background: #fff; padding: 30px 20px; text-align: center; border-bottom: 1px solid #dbdbdb; }
        .avatar-large { width: 100px; height: 100px; border-radius: 50%; background-color: #ccc; margin-bottom: 10px; border: 3px solid #eee; }
        
        .settings-list { margin-top: 20px; background: #fff; border-top: 1px solid #dbdbdb; }
        .setting-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        footer { display: flex; justify-content: space-around; align-items: center; height: 60px; background-color: #ffffff; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; }
        footer a { color: #262626; font-size: 1.5rem; text-decoration: none; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="avatar-large" style="margin: 0 auto 10px;"></div>
        <h2>Roméo</h2>
        <p>Membre fondateur de Martinius</p>
    </div>

    <div class="settings-list">
        <div class="setting-item">
            <span>Mode Incognito</span>
            <i class="fa-solid fa-toggle-on" style="color: #00d2ff;"></i>
        </div>
        <div class="setting-item">
            <span>Notifications</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>
        <div class="setting-item">
            <span>Confidentialité</span>
            <i class="fa-solid fa-lock"></i>
        </div>
    </div>

    <footer>
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
        <a href="inbox.html"><i class="fa-solid fa-envelope"></i></a>
        <a href="lox.html"><i class="fa-solid fa-robot"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user"></i></a>
    </footer>

</body>
</html>
