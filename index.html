<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Martinius - Connexion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        input { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; }
        button { width: 100%; max-width: 300px; padding: 15px; border-radius: 8px; border: none; background: #00d2ff; color: #0f0f0f; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Martinius</h1>
        <p>Veuillez vous authentifier</p>
        <input type="text" placeholder="Nom d'utilisateur">
        <input type="password" placeholder="Mot de passe">
        <button onclick="window.location.href='home.html'">Accéder au QG</button>
    </div>
</body>
</html>
